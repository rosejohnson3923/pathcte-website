[build]
  publish = "dist"
  command = "npm run build"

# SPA redirect - serve index.html for all routes so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"